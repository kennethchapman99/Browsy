<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recorder Frame Form</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 6px 10px; }
    label { display: block; font-weight: 600; margin-top: .4em; }
    input { width: 100%; padding: .35em; box-sizing: border-box; }
  </style>
</head>
<body>
  <label for="frame-field">Frame-scoped field</label>
  <input type="text" id="frame-field" name="frame_field" placeholder="Type inside the iframe">

</body>
</html>
