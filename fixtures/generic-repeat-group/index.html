<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browsy Generic Repeat-Group Fixture</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; background: #f9f9f9; }
    h1, h2 { color: #222; }
    h2 { font-size: 1.1rem; margin: 1.6em 0 .5em; border-bottom: 1px solid #ddd; padding-bottom: .3em; }
    .form-group { margin: 1em 0; }
    label { display: block; font-weight: 600; margin-bottom: .35em; color: #333; font-size: .9rem; }
    input[type="text"], input[type="date"], input[type="number"], select {
      width: 100%; padding: .5em .7em; border: 1px solid #ccc; border-radius: 4px;
      font-size: 1em; box-sizing: border-box;
    }
    input[type="file"] { width: 100%; }
    .item-section {
      border: 2px solid #8ab4d8; border-radius: 8px; padding: 1.2em; margin: 1em 0;
      background: #fff; position: relative;
    }
    .item-section h3 { margin: 0 0 .8em; font-size: .95rem; color: #334; }
    .item-section .remove-item {
      position: absolute; top: .8em; right: .8em;
      background: none; border: 1px solid #bbb; border-radius: 4px;
      padding: .2em .6em; cursor: pointer; font-size: .8rem; color: #666;
    }
    .btn { padding: .55em 1.4em; border-radius: 4px; font-size: 1em; cursor: pointer; border: none; }
    #btn-add-item { background: #2c7; color: white; margin: 1em 0; }
    .danger-zone { border: 2px solid #e55; padding: 1em; border-radius: 6px; background: #fff5f5; margin-top: 2em; }
    .danger-zone legend { color: #c00; font-weight: bold; }
    #btn-final-submit { background: #c33; color: white; }
    #status { margin: 1em 0; padding: .7em 1em; border-radius: 4px; display: none; font-weight: 600; }
    .status-ok { background: #d4edda; color: #155724; }
    .item-count { font-size: .82em; color: #666; margin-left: .5em; }
  </style>
</head>
<body>
  <h1>Project Budget Submission</h1>
  <p style="color:#666;font-size:.9rem">Browsy generic repeat-group fixture. Project-level fields fill once; line items repeat per entry.</p>

  <div id="status"></div>

  <h2>Project details</h2>

  <div class="form-group">
    <label>Project name</label>
    <input type="text" data-browsy-field="projectName" placeholder="e.g. Acme Redesign 2026">
  </div>

  <div class="form-group">
    <label>Client name</label>
    <input type="text" data-browsy-field="clientName" placeholder="e.g. Acme Corp">
  </div>

  <div class="form-group">
    <label>Due date</label>
    <input type="date" data-browsy-field="dueDate">
  </div>

  <div class="form-group">
    <label>Department</label>
    <select data-browsy-field="department">
      <option value="">-- Select --</option>
      <option>Design</option>
      <option>Engineering</option>
      <option>Marketing</option>
      <option>Operations</option>
    </select>
  </div>

  <div class="form-group">
    <label>Project brief <span style="font-weight:normal;color:#666">(PDF or DOCX)</span></label>
    <input type="file" data-browsy-field="projectBrief" accept=".pdf,.docx,.txt">
  </div>

  <h2>Line items <span class="item-count" id="item-count">(1 item)</span></h2>

  <div id="items-container">
    <!-- First item section pre-exists in DOM -->
    <div class="item-section" data-browsy-item-section id="item-1">
      <h3>Item 1</h3>
      <button class="remove-item" onclick="removeItem(1)">&#x2715; Remove</button>

      <div class="form-group">
        <label>Item name</label>
        <input type="text" data-browsy-item-field="itemName" placeholder="e.g. UX Research">
      </div>

      <div class="form-group">
        <label>Quantity (hours)</label>
        <input type="number" data-browsy-item-field="quantity" placeholder="0" min="0">
      </div>

      <div class="form-group">
        <label>Unit price ($)</label>
        <input type="number" data-browsy-item-field="unitPrice" placeholder="0.00" min="0" step="0.01">
      </div>

      <div class="form-group">
        <label>Category</label>
        <select data-browsy-item-field="category">
          <option value="">-- Select --</option>
          <option>Labor</option>
          <option>Design</option>
          <option>Engineering</option>
          <option>Materials</option>
          <option>Travel</option>
        </select>
      </div>

      <div class="form-group">
        <label>Item attachment <span style="font-weight:normal;color:#666">(optional)</span></label>
        <input type="file" data-browsy-item-field="itemAttachment" accept=".pdf,.txt,.docx">
      </div>
    </div>
  </div>

  <button class="btn" id="btn-add-item" data-browsy-action="add-item" onclick="addItem()">+ Add line item</button>

  <fieldset class="danger-zone">
    <legend>Final submission — stay manual</legend>
    <p style="font-size:.88rem;color:#666;margin:.3em 0 1em">These actions are blocked by Browsy safety policy. A human must review and click these.</p>
    <button class="btn" id="btn-final-submit" data-browsy-action="final-submit" onclick="handleFinal('submit')">Submit to Client</button>
  </fieldset>

  <script>
    let itemCount = 1;

    function addItem() {
      itemCount++;
      updateItemCount();
      const container = document.getElementById('items-container');
      const section = document.createElement('div');
      section.className = 'item-section';
      section.setAttribute('data-browsy-item-section', '');
      section.id = 'item-' + itemCount;
      section.innerHTML = `
        <h3>Item ${itemCount}</h3>
        <button class="remove-item" onclick="removeItem(${itemCount})">&#x2715; Remove</button>

        <div class="form-group">
          <label>Item name</label>
          <input type="text" data-browsy-item-field="itemName" placeholder="e.g. UX Research">
        </div>

        <div class="form-group">
          <label>Quantity (hours)</label>
          <input type="number" data-browsy-item-field="quantity" placeholder="0" min="0">
        </div>

        <div class="form-group">
          <label>Unit price ($)</label>
          <input type="number" data-browsy-item-field="unitPrice" placeholder="0.00" min="0" step="0.01">
        </div>

        <div class="form-group">
          <label>Category</label>
          <select data-browsy-item-field="category">
            <option value="">-- Select --</option>
            <option>Labor</option>
            <option>Design</option>
            <option>Engineering</option>
            <option>Materials</option>
            <option>Travel</option>
          </select>
        </div>

        <div class="form-group">
          <label>Item attachment <span style="font-weight:normal;color:#666">(optional)</span></label>
          <input type="file" data-browsy-item-field="itemAttachment" accept=".pdf,.txt,.docx">
        </div>
      `;
      container.appendChild(section);
      section.querySelector('input[type="text"]').focus();
    }

    function removeItem(n) {
      const el = document.getElementById('item-' + n);
      if (el) el.remove();
      updateItemCount();
    }

    function updateItemCount() {
      const sections = document.querySelectorAll('[data-browsy-item-section]');
      document.getElementById('item-count').textContent = '(' + sections.length + ' item' + (sections.length === 1 ? '' : 's') + ')';
    }

    function handleFinal(action) {
      const status = document.getElementById('status');
      status.className = 'status-ok';
      status.style.display = 'block';
      status.textContent = '[FIXTURE] ' + action + ' triggered — in a real workflow this is manual-only.';
      window.lastFinalAction = action;
    }
  </script>
</body>
</html>
